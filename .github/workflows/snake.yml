name: Generate snake animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs (tokyonight palette)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#9d7cd8&color_dots=#e6e8ef,#9aa5ce,#7aa2f7,#3d59a1,#24283b
            dist/github-contribution-grid-snake-dark.svg?color_snake=#bb9af7&color_dots=#24283b,#3d59a1,#5a7fd6,#7aa2f7,#c0caf5

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
